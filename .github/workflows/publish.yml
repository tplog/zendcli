name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: publish-npm
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build Rust binary
        run: cargo build --release

      - name: Test
        run: cargo test

      - name: Prepare npm package
        run: |
          mkdir -p dist
          cp target/release/zend dist/zend
          chmod +x dist/zend

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Ensure npm supports trusted publishing
        run: npm install -g npm@latest

      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="v$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$VERSION" ]; then
            echo "Git tag $TAG does not match package.json version $VERSION"
            exit 1
          fi

      - name: Check package version is unpublished
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "Version $NAME@$VERSION already exists on npm. Bump package.json version before publishing."
            exit 1
          fi

      - name: Publish package
        run: npm publish --access public --provenance
        env:
          NPM_CONFIG_PROVENANCE: true
