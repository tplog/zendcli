name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: publish-npm
  cancel-in-progress: false

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            npm-dir: darwin-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            npm-dir: darwin-x64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            npm-dir: linux-x64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            npm-dir: linux-arm64

    runs-on: ${{ matrix.os }}
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build Rust binary
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Prepare platform package
        run: |
          cp target/${{ matrix.target }}/release/zend npm/${{ matrix.npm-dir }}/zend
          chmod +x npm/${{ matrix.npm-dir }}/zend

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-${{ matrix.npm-dir }}
          path: npm/${{ matrix.npm-dir }}/

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Test
        run: cargo test

  publish:
    needs: [build, test]
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Restore platform packages
        run: |
          for dir in darwin-arm64 darwin-x64 linux-x64 linux-arm64; do
            cp artifacts/npm-${dir}/zend npm/${dir}/zend 2>/dev/null || true
            chmod +x npm/${dir}/zend 2>/dev/null || true
          done

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="v$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$VERSION" ]; then
            echo "Git tag $TAG does not match package.json version $VERSION"
            exit 1
          fi

      - name: Publish platform packages
        run: |
          for dir in darwin-arm64 darwin-x64 linux-x64 linux-arm64; do
            echo "Publishing @tplog/zendcli-${dir}..."
            cd npm/${dir}
            npm publish --access public
            cd ../..
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish main package
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
